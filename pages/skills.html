<script>
const PP=8;let cp=1,filtered=SKILLS;renderCategoryPills(CATEGORIES,'skillPills');
function filterS(){const q=(document.getElementById('skillSearch').value||'').toLowerCase();const ap=document.querySelector('.category-pills .pill.active');const cat=ap?ap.dataset.cat:'全部';filtered=SKILLS.filter(s=>{return(!q||s.name.toLowerCase().includes(q)||s.desc.toLowerCase().includes(q))&&(cat==='全部'||s.category===cat);});cp=1;rp(1);}
function rp(p){cp=p;const s=(p-1)*PP;document.getElementById('allSkills').innerHTML=filtered.slice(s,s+PP).map(s=>renderSkillCard(s)).join('');renderPagination('skillPag',filtered.length,PP,p,'rp');}
setTimeout(()=>{document.querySelectorAll('.category-pills .pill').forEach(p=>{p.addEventListener('click',()=>setTimeout(filterS,10));});},50);
rp(1);
</script></body></html>
