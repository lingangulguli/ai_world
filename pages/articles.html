<script>
const PP=9;let cp=1,filtered=ARTICLES,ctype='全部';
renderCategoryPills(CATEGORIES,'pagePills');
function filterAll(type,btn){if(type!==null)ctype=type;if(btn){document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');}const q=(document.getElementById('articleSearch').value||'').toLowerCase();const ap=document.querySelector('.category-pills .pill.active');const cat=ap?ap.dataset.cat:'全部';filtered=ARTICLES.filter(a=>{return(ctype==='全部'||a.type===ctype)&&(!q||a.title.toLowerCase().includes(q)||a.desc.toLowerCase().includes(q))&&(cat==='全部'||a.category===cat);});cp=1;rp(1);}
function rp(p){cp=p;const s=(p-1)*PP;document.getElementById('allArticles').innerHTML=filtered.slice(s,s+PP).map(a=>renderArticleCard(a,false)).join('');renderPagination('articlePagination',filtered.length,PP,p,'rp');}
setTimeout(()=>{document.querySelectorAll('.category-pills .pill').forEach(p=>{p.addEventListener('click',()=>setTimeout(()=>filterAll(null,null),10));});},50);
rp(1);
</script></body></html>
