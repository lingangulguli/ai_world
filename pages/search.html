<div class="page-hero"><h1>搜索</h1></div>

<script src="../js/main.js"></script>
<script>
const inp=document.getElementById('searchInput');
const ps=new URLSearchParams(window.location.search);
if(ps.get('q')){inp.value=ps.get('q');doPS();}
inp.addEventListener('keydown',e=>{if(e.key==='Enter')doPS();});
function doPS(){const q=inp.value.trim();if(!q)return;const r=globalSearch(q);const t=r.articles.length+r.skills.length+r.tools.length;document.getElementById('searchSum').innerHTML=t?'找到 <strong>'+t+'</strong> 条与 "<strong>'+q+'</strong>" 相关的结果':'未找到结果';let h='';if(r.articles.length)h+='<div class="result-section"><div class="result-section-title">📝 文章 <span class="count">('+r.articles.length+')</span></div><div class="articles-grid">'+r.articles.map(a=>renderArticleCard(a,false)).join('')+'</div></div>';if(r.skills.length)h+='<div class="result-section"><div class="result-section-title">⚡ Skills <span class="count">('+r.skills.length+')</span></div><div class="skills-grid">'+r.skills.map(s=>renderSkillCard(s)).join('')+'</div></div>';if(r.tools.length)h+='<div class="result-section"><div class="result-section-title">🔧 工具 <span class="count">('+r.tools.length+')</span></div><div class="tools-grid">'+r.tools.map(t=>renderToolCard(t)).join('')+'</div></div>';document.getElementById('searchRes').innerHTML=h;window.history.replaceState(null,'','search.html?q='+encodeURIComponent(q));}
</script></body></html>
