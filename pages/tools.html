function fCat(c){document.querySelectorAll('.tool-card-v2').forEach(x=>{x.style.display=(c==='全部'||x.dataset.category===c)?'':'none';});event.target.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');}
function fSrc(s,btn){btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.tool-card-v2').forEach(c=>{const i=c.querySelector('.badge-internal');if(s==='全部')c.style.display='';else if(s==='司内'&&i)c.style.display='';else if(s==='外部'&&!i)c.style.display='';else c.style.display='none';});}
